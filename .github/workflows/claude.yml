name: Claude Code Action

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  claude-code:
    if: contains(github.event.comment.body, '@claude')
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      pull-requests: write
      issues: write
      
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install Claude Code
      run: |
        npm install -g @anthropic-ai/claude-code

    - name: Extract Claude command
      id: extract-command
      run: |
        COMMENT_BODY="${{ github.event.comment.body }}"
        # @claude 以降のテキストを抽出
        CLAUDE_COMMAND=$(echo "$COMMENT_BODY" | sed -n 's/.*@claude\s*\(.*\)/\1/p')
        echo "command=$CLAUDE_COMMAND" >> $GITHUB_OUTPUT
        echo "Extracted command: $CLAUDE_COMMAND"

    - name: Run Claude Code
      env:
        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        # PRの場合は該当ブランチをチェックアウト
        if [ "${{ github.event_name }}" = "pull_request_review_comment" ]; then
          git checkout ${{ github.event.pull_request.head.ref }}
        fi
        
        # Claude Codeを実行
        claude-code "${{ steps.extract-command.outputs.command }}" --non-interactive
        
    - name: Commit and push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        
        if [ -n "$(git status --porcelain)" ]; then
          git add .
          git commit -m "Claude Code: ${{ steps.extract-command.outputs.command }}"
          git push
          
          # コメントに結果を報告
          if [ "${{ github.event_name }}" = "issue_comment" ]; then
            COMMENT_URL="${{ github.event.issue.comments_url }}"
          else
            COMMENT_URL="${{ github.event.pull_request.comments_url }}"
          fi
          
          curl -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "$COMMENT_URL" \
            -d '{"body":"✅ Claude Code実行完了: `${{ steps.extract-command.outputs.command }}`\n\n変更をコミットしました。"}'
        else
          # 変更がない場合
          if [ "${{ github.event_name }}" = "issue_comment" ]; then
            COMMENT_URL="${{ github.event.issue.comments_url }}"
          else
            COMMENT_URL="${{ github.event.pull_request.comments_url }}"
          fi
          
          curl -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "$COMMENT_URL" \
            -d '{"body":"ℹ️ Claude Code実行完了: `${{ steps.extract-command.outputs.command }}`\n\nファイルに変更はありませんでした。"}'
        fi

    - name: Handle errors
      if: failure()
      run: |
        if [ "${{ github.event_name }}" = "issue_comment" ]; then
          COMMENT_URL="${{ github.event.issue.comments_url }}"
        else
          COMMENT_URL="${{ github.event.pull_request.comments_url }}"
        fi
        
        curl -X POST \
          -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
          -H "Accept: application/vnd.github.v3+json" \
          "$COMMENT_URL" \
          -d '{"body":"❌ Claude Code実行中にエラーが発生しました。\n\nワークフローログを確認してください。"}'
